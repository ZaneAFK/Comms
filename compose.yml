services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    image: ghcr.io/zaneafk/comms-client:${COMMS_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend
      - seq

  backend:
    image: ghcr.io/zaneafk/comms-server:${COMMS_VERSION:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Database=CommsDb;Username=${DATABASE_USER};Password=${DATABASE_PASSWORD};Port=5432"
      Jwt__Key: ${JWT_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started

  postgres:
    image: postgres:17
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d CommsDb"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: CommsDb
    volumes:
      - comms_postgres_data:/var/lib/postgresql/data

  seq:
    image: datalust/seq:2025.1
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    volumes:
      - comms_seq_data:/data

volumes:
  comms_postgres_data:
  comms_seq_data:
